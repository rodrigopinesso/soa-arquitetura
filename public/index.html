<!DOCTYPE html>
<html>
<head>
    <title>Análise de Tendências de Nomes no Brasil</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Análise de Tendências de Nomes no Brasil</h1>

    <div class="card">
        <h2>Evolução do Ranking de um Nome</h2>
        <input type="text" id="nomeInput" placeholder="Digite um nome">
        <input type="number" id="inicioInput" placeholder="Início">
        <input type="number" id="fimInput" placeholder="Fim">
        <button onclick="buscarEvolucaoNome()">Buscar</button>
        <canvas id="chartNome"></canvas>
    </div>

    <div class="card">
        <h2>Comparação de Dois Nomes</h2>
        <input type="text" id="nome1Input" placeholder="Nome 1">
        <input type="text" id="nome2Input" placeholder="Nome 2">
        <button onclick="compararNomes()">Comparar</button>
        <canvas id="chartComparacao"></canvas>
    </div>

    <div class="card">
        <h2>Evolução dos Nomes em uma Localidade</h2>
        <input type="text" id="localidadeInput" placeholder="UF (ex: SP)">
        <button onclick="buscarLocalidade()">Buscar</button>
        <table border="1" id="tabelaLocalidade">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Frequência</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
